<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name - Portfolio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2d3436;
            --accent-color: #0984e3;
            --bg-color: #ffffff;
            --text-color: #2d3436;
            --light-gray: #f5f6fa;
            --dark-bg: #121212;
            --dark-text: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            text-align: center;
            padding: 120px 20px;
            background: linear-gradient(135deg, var(--accent-color), #74b9ff);
            color: white;
        }

        .header-content h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .header-content p {
            font-size: 1.5rem;
        }

        section {
            padding: 80px 0;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s forwards ease-out;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--primary-color);
        }

        .card {
            background-color: var(--light-gray);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .skill-tag {
            background: var(--light-gray);
            border: 2px solid var(--accent-color);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .skill-tag:hover {
            background: var(--accent-color);
            color: white;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .project-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .project-content {
            padding: 1.5rem;
        }

        .project-content h3 {
            margin-bottom: 0.5rem;
            color: var(--accent-color);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
        }

        .social-link {
            background: var(--accent-color);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.3s, transform 0.3s;
        }

        .social-link:hover {
            background: #74b9ff;
            transform: translateY(-3px);
        }

        .dark-mode {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--accent-color);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .dark-mode:hover {
            background: #74b9ff;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 80px 20px;
            }

            .header-content h1 {
                font-size: 2.5rem;
            }

            section {
                padding: 60px 20px;
            }
        }
    </style>
</head>
<body>
    <button class="dark-mode" onclick="toggleDarkMode()">Dark Mode</button>

    <header>
        <div class="container header-content">
            <h1>Your Name</h1>
            <p>Software Developer</p>
        </div>
    </header>

    <main class="container">
        <!-- Sections here (About, Skills, Experience, etc.) -->
    </main>

    <script>
        function toggleDarkMode() {
            const root = document.documentElement;
            const isDark = root.style.getPropertyValue('--bg-color') === 'var(--dark-bg)';
            root.style.setProperty('--bg-color', isDark ? 'var(--light-gray)' : 'var(--dark-bg)');
            root.style.setProperty('--text-color', isDark ? 'var(--primary-color)' : 'var(--dark-text)');
        }
    </script>
</body>
</html>
